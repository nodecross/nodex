name: build
description: ""
inputs:
  target:
    required: true
    description: ""
  use-cache:
    required: true
    description: ""
  checkout:
    required: false
    description: ""
  github-token:
    required: true
    description: ""
runs:
  using: composite
  steps:
    - name: (checkout) source code
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v4

    - name: (setup) rust
      uses: ./.github/actions/build-preparation
      with:
        target: ${{ matrix.target }}
        use-cache: true

    - name: (run) build
      shell: bash
      run: cargo build --release --target ${{ inputs.target }}

    - name: Install Cosign
      if: contains(inputs.target, 'windows')
      uses: sigstore/cosign-installer@v3

    - name: Sign the binary using OIDC
      if: contains(inputs.target, 'windows')
      shell: bash
      run: |
        cosign sign-blob \
          --yes \
          --oidc-issuer "https://token.actions.githubusercontent.com" \
          --oidc-client-id "sigstore" \
          --bundle nodex-agent.bundle \
          target/${{ inputs.target }}/release/nodex-agent

    - name: (run) create artifact for Windows
      if: contains(inputs.target, 'windows')
      uses: vimtor/action-zip@v1.1
      with:
        files: target/${{ inputs.target }}/release/nodex-agent.exe
        dest: nodex-agent-${{ inputs.target }}.zip

    - name: (run) create artifact for non-Windows
      if: "!contains(inputs.target, 'windows')"
      uses: vimtor/action-zip@v1.1
      with:
        files: |
          target/${{ inputs.target }}/release/nodex-agent
          nodex-agent.bundle
        dest: nodex-agent-${{ inputs.target }}.zip

    - name: (run) upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.target }}
        path: nodex-agent-${{ inputs.target }}.zip
