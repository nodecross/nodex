name: sign
description: "sign binary with cosign"
inputs:
  binary-path:
    required: true
    description: "the path of the binary to be tested"
runs:
  using: composite
  steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    - name: Sign the binary using OIDC
      shell: bash
      run: |
        cosign sign-blob \
          --yes \
          --oidc-issuer "https://token.actions.githubusercontent.com" \
          --oidc-client-id "sigstore" \
          --bundle nodex-agent.bundle \
          ${{ inputs.binary-path }}
