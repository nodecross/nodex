name: e2e test
description: "E2E test action"
inputs:
  binary-path:
    required: true
    description: "the path of the binary to be tested"
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '20.15.0'

    - name: (setup) copy default config to home
      shell: powershell
      run: New-Item -ItemType Directory -Force -Path $env:USERPROFILE\.config\nodex; Copy-Item test_resource\config\* $env:USERPROFILE\.config\nodex\

    - name: Install Prism CLI
      shell: powershell
      run: npm install -g @stoplight/prism-cli

    - name: Get Prism Path
      id: get-prism-path
      shell: powershell
      run: |
        $prismPath = Get-Command prism | Select-Object -ExpandProperty Source
        echo "::set-output name=prismPath::$prismPath"

    # - name: Cache Squid
    #   id: cache-squid
    #   uses: actions/cache@v4
    #   with:
    #     path: squid.msi
    #     key: ${{ runner.os }}-squid

    # - name: Get Squid
    #   if: steps.cache-squid.outputs.cache-hit != 'true'
    #   shell: powershell
    #   run: Invoke-WebRequest https://packages.diladele.com/squid/4.14/squid.msi -OutFile squid.msi

    # - name: Install Squid
    #   shell: powershell
    #   run: |
    #     $file = "squid.msi"
    #     $log = "install.log"
    #     New-Item -Path $log -ItemType File -Force | Out-Null
    #     $procMain = Start-Process "msiexec" "/i `"$file`" /qn /l*! `"$log`"" -NoNewWindow -PassThru
    #     $procLog = Start-Process "powershell" "Get-Content -Path `"$log`" -Wait" -NoNewWindow -PassThru
    #     $procMain.WaitForExit()
    #     $procLog.Kill()

    - name: Cache mitmproxy
      id: cache-mitmproxy
      uses: actions/cache@v4
      with:
        path: mitmproxy.zip
        key: ${{ runner.os }}-mitmproxy

    - name: Get mitmproxy
      if: steps.cache-mitmproxy.outputs.cache-hit != 'true'
      shell: powershell
      run: Invoke-WebRequest https://downloads.mitmproxy.org/10.4.0/mitmproxy-10.4.0-windows-x86_64.zip -OutFile mitmproxy.zip

    - name: Extract mitmproxy
      shell: powershell
      run: Expand-Archive -Path mitmproxy.zip -DestinationPath .

    - name: Cache Nginx
      id: cache-nginx
      uses: actions/cache@v4
      with:
        path: nginx.zip
        key: ${{ runner.os }}-nginx

    - name: Get Nginx
      if: steps.cache-nginx.outputs.cache-hit != 'true'
      shell: powershell
      run: Invoke-WebRequest http://nginx.org/download/nginx-1.26.1.zip -OutFile nginx.zip

    - name: Extract Nginx
      shell: powershell
      run: Expand-Archive -Path nginx.zip -DestinationPath .

    - name: Install CA Cert
      shell: powershell
      run: certutil -addstore -f "ROOT" .\test_resource\fixtures\root-CA.crt

    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3

# Get-Content .\test_resource\fixtures\proxy-cert.crt, .\test_resource\fixtures\proxy-cert.key | Set-Content proxy-cert.pem
# .\mitmproxy.exe --certs *=.\proxy-cert.pem --set listen_port=3129

# cp -r .\test_resource\fixtures\ D:\Squid\
# cp .\test_resource\squid\conf\squid.conf D:\Squid\etc\squid\squid.conf
# D:\Squid\bin\squid.exe -f .\test_resource\squid\conf\squid.conf
# Import-Certificate -Filepath .\test_resource\fixtures\root-CA.crt -CertStoreLocation Cert:\CurrentUser\Root -WhatIf

# Remove-item alias:curl
# curl --proxy "https://localhost:3129" https://google.com
# curl --proxy-insecure --proxy "https://localhost:3129" https://google.com
      # certutil -addstore -f "ROOT" .\test_resource\fixtures\root-CA.crt
      # curl --proxy-cacert .\test_resource\fixtures\root-CA.crt

# Stop-Process -Name "squid"
# nginx-1.26.1

    - name: Setup and Run Tests
      shell: powershell
      run: |
        $prismPath = "${{ steps.get-prism-path.outputs.prismPath }}"
        $sidetreeResourcePath = Join-Path -Path $PWD -ChildPath "test_resource/did_sidetree.yaml"
        $studioResourcePath = Join-Path -Path $PWD -ChildPath "test_resource/studio.yaml"

        Start-Process -NoNewWindow -FilePath "powershell" -ArgumentList "-File $prismPath mock -h 127.0.0.1 -p 4010 $sidetreeResourcePath"
        Start-Process -NoNewWindow -FilePath "powershell" -ArgumentList "-File $prismPath mock -h 127.0.0.1 -p 8020 $studioResourcePath"
        Start-Sleep -Seconds 10

        $agentPath = Join-Path -Path $PWD -ChildPath ${{ inputs.binary-path }}
        $stdErrLogTmp = Join-Path -Path $PWD -ChildPath ".\stderr.log"
        $stdOutLogTmp = Join-Path -Path $PWD -ChildPath ".\stdout.log"
        Start-Process -FilePath "$agentPath" -NoNewWindow -RedirectStandardOutput "$stdOutLogTmp" -RedirectStandardError "$stdErrLogTmp"
        Start-Sleep -Seconds 10

        cd e2e
        cargo test
      env:
        NODEX_DID_HTTP_ENDPOINT: http://127.0.0.1:4010
        NODEX_DID_ATTACHMENT_LINK: http://127.0.0.1:4010
        NODEX_STUDIO_HTTP_ENDPOINT: http://127.0.0.1:8020
        NODEX_SERVER_PORT: 3000
        RUST_BACKTRACE: 1

    - name: (run) show log of agent
      shell: powershell
      run: |
        $stdOutLogTmp = Join-Path -Path $PWD -ChildPath ".\stdout.log"
        Get-Content $stdOutLogTmp
        $stdErrLogTmp = Join-Path -Path $PWD -ChildPath ".\stderr.log"
        Get-Content $stdErrLogTmp
      if: ${{ always() }}
